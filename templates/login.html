<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
}

.login-box{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#2563eb;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #cbd5e1;
border-radius:6px;
}

.login-box button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.login-box button:hover{
background:#1d4ed8;
}

.note{
margin-top:15px;
font-size:13px;
color:#64748b;
}

.warning{
margin-top:10px;
color:#dc2626;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if message %}
<div class="warning">{{ message }}</div>
{% else %}
<div class="note">
Unauthorized access is monitored
</div>
{% endif %}

</div>

</body>
</html>
